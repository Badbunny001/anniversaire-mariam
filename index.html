<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joyeux Anniversaire Mariam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            touch-action: manipulation;
        }

        /* Matrix Emoji Rain Canvas - Phase 1 */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Floating Emojis Canvas - Phase 3 (apparaît à la fin) */
        #floatingCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 25;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #floatingCanvas.active {
            opacity: 1;
        }

        /* Main Content Container */
        .container {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Countdown & Text Animation - Responsive */
        .countdown-text {
            font-size: clamp(3rem, 15vw, 6rem);
            font-weight: bold;
            color: #ff69b4;
            text-shadow: 0 0 20px #ff1493, 0 0 40px #ff69b4, 0 0 60px #ff1493;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s ease;
            position: absolute;
            text-align: center;
            width: 100%;
            padding: 0 20px;
            word-break: break-word;
        }

        .countdown-text.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Heart Animation */
        .heart {
            font-size: clamp(4rem, 20vw, 8rem);
            color: #ff69b4;
            text-shadow: 0 0 30px #ff1493, 0 0 60px #ff69b4;
            opacity: 0;
            transform: scale(0);
            transition: all 0.8s ease;
            position: absolute;
        }

        .heart.show {
            opacity: 1;
            transform: scale(1);
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Photo Gallery Section */
        .gallery-section {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 100%);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow-y: auto;
        }

        .gallery-section.active {
            display: flex;
        }

        /* Message Card - Responsive */
        .message-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.3);
            transform: translateY(-30px);
            opacity: 0;
            animation: slideDown 1s ease forwards;
            max-width: 90vw;
            width: auto;
        }

        .message-card h2 {
            color: #333;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: clamp(1rem, 4vw, 1.3rem);
            text-align: center;
            line-height: 1.4;
        }

        /* Photo Display - Responsive */
        .photo-display {
            width: min(85vw, 350px);
            height: min(85vw, 350px);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(255, 105, 180, 0.4);
            border: 3px solid #ff69b4;
            position: relative;
            background: #222;
            flex-shrink: 0;
        }

        .photo-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.5s ease;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-top: 25px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid #ff69b4;
            background: rgba(255, 105, 180, 0.2);
            color: #ff69b4;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: rgba(255, 105, 180, 0.3);
        }

        .nav-btn:hover, .nav-btn:active {
            background: #ff69b4;
            color: white;
            transform: scale(1.1);
        }

        .photo-counter {
            color: #ff69b4;
            font-size: 1rem;
            font-weight: bold;
            min-width: 60px;
            text-align: center;
        }

        /* Instruction text */
        .instruction {
            color: rgba(255, 105, 180, 0.8);
            font-size: 0.9rem;
            margin-top: 15px;
            text-align: center;
            padding: 0 10px;
        }

        /* Continue Button */
        .continue-btn {
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 25px;
            border: 3px solid #ff69b4;
            background: rgba(255, 105, 180, 0.2);
            color: #ff69b4;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            -webkit-tap-highlight-color: rgba(255, 105, 180, 0.3);
        }

        .continue-btn:hover, .continue-btn:active {
            background: #ff69b4;
            color: white;
            transform: scale(1.05);
        }

        /* Heart Collage Section */
        .heart-collage {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 30;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        .heart-collage.active {
            display: flex;
        }

        .collage-container {
            position: relative;
            width: min(90vw, 400px);
            height: min(90vw, 400px);
            transform: scale(0.9);
        }

        .collage-photo {
            position: absolute;
            width: clamp(60px, 15vw, 80px);
            height: clamp(60px, 15vw, 80px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.6);
            border: 3px solid #ff69b4;
            opacity: 0;
            animation: popIn 0.5s ease forwards;
        }

        .collage-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideDown {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Start Button - Responsive */
        .start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 18px 40px;
            background: linear-gradient(45deg, #ff1493, #ff69b4);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255, 20, 147, 0.4);
            transition: all 0.3s ease;
            z-index: 50;
            font-family: 'Courier New', monospace;
            -webkit-tap-highlight-color: rgba(255, 255, 255, 0.3);
            white-space: nowrap;
        }

        .start-btn:hover, .start-btn:active {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 15px 50px rgba(255, 20, 147, 0.6);
        }

        .start-btn.hidden {
            display: none;
        }

        /* Editor Credit */
        .editor-credit {
            position: fixed;
            bottom: 10px;
            right: 15px;
            font-size: 0.8rem;
            color: rgba(255, 105, 180, 0.8);
            font-family: 'Courier New', monospace;
            z-index: 100;
            letter-spacing: 1px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 105, 180, 0.5);
        }

        /* Final message */
        .final-message {
            color: #ff69b4;
            font-size: clamp(1.5rem, 6vw, 2rem);
            text-align: center;
            margin-top: 20px;
            text-shadow: 0 0 20px #ff1493;
            opacity: 0;
            animation: fadeIn 2s ease 2s forwards;
            padding: 0 20px;
            z-index: 35;
            position: relative;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Swipe indicators for mobile */
        .swipe-hint {
            display: none;
            color: rgba(255, 105, 180, 0.6);
            font-size: 0.8rem;
            margin-top: 10px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .swipe-hint {
                display: block;
            }
            
            .instruction {
                display: none;
            }
        }

        /* Prevent text selection */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="no-select">
    <!-- Phase 1: Matrix Emoji Rain Background -->
    <canvas id="matrixCanvas"></canvas>

    <!-- Phase 3: Floating Emojis (apparaît à la fin) -->
    <canvas id="floatingCanvas"></canvas>

    <!-- Editor Credit -->
    <div class="editor-credit">Edited by DS_Babace</div>

    <!-- Start Button -->
    <button class="start-btn" onclick="startAnimation()">✨ Commencer ✨</button>

    <!-- Main Container -->
    <div class="container" id="mainContainer">
        <div class="countdown-text" id="countdownText"></div>
        <div class="heart" id="heart">❤️</div>
    </div>

    <!-- Photo Gallery Section -->
    <div class="gallery-section" id="gallerySection">
        <div class="message-card">
            <h2 id="galleryMessage">Bonne fête Mariam ! 🎉</h2>
        </div>
        
        <div class="photo-display" id="photoDisplay">
            <img src="" alt="Photo de Mariam" id="currentPhoto">
        </div>
        
        <div class="nav-buttons">
            <button class="nav-btn" onclick="prevPhoto()">◀</button>
            <span class="photo-counter" id="photoCounter">1 / 7</span>
            <button class="nav-btn" onclick="nextPhoto()">▶</button>
        </div>
        
        <p class="instruction">Utilise les flèches pour naviguer</p>
        <p class="swipe-hint">👆 Glissez gauche/droite pour naviguer</p>
        
        <button class="continue-btn" onclick="showHeartCollage()">
            Continuer ❤️
        </button>
    </div>

    <!-- Heart Collage Section -->
    <div class="heart-collage" id="heartCollage">
        <div class="collage-container" id="collageContainer"></div>
        <div class="final-message">Meilleurs vœux Mariam ! 🎂</div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - AJOUTE TES 7 PHOTOS ICI
        // ============================================
        const photos = [
            'photos/mariam1.jpg',   // Photo 1
            'photos/mariam2.jpg',   // Photo 2
            'photos/mariam3.jpg',   // Photo 3
            'photos/mariam4.jpg',   // Photo 4
            'photos/mariam5.jpg',   // Photo 5
            'photos/mariam6.jpg',   // Photo 6
            'photos/mariam7.jpg'    // Photo 7
        ];

        // Messages amicaux et de meilleurs vœux pour chaque photo
        const photoMessages = [
            "Bonne fête Mariam ! 🎉",
            "Que cette année te comble de bonheur ✨",
            "Tous mes meilleurs vœux pour ton anniversaire 🎂",
            "Profite de ta journée spéciale ! 🎈",
            "Une année de plus, pleine de succès 🌟",
            "Reste toujours aussi rayonnante ☀️",
            "Bonne fête à toi, mon amie ! 🎊"
        ];

        // ============================================
        // PHASE 1: MATRIX EMOJI RAIN (Début jusqu'à la galerie)
        // ============================================
        const matrixCanvas = document.getElementById('matrixCanvas');
        const matrixCtx = matrixCanvas.getContext('2d');

        let matrixAnimationId;
        let isMatrixRunning = true;

        function resizeMatrixCanvas() {
            matrixCanvas.width = window.innerWidth;
            matrixCanvas.height = window.innerHeight;
        }

        resizeMatrixCanvas();

        const matrixEmojis = ['⭐', '🌟', '✨', '🌸', '🌺', '🌻', '🌷', '🌹', '💐', '🦋', '🎀', '💖', '💝', '🎈', '🎉', '🎊', '🌈', '☀️', '🌙', '💫', '🍀', '🌿', '🕊️', '💕', '🎵', '💗', '💓', '💞', '💘', '❤️'];
        
        const fontSize = 20;
        let columns = Math.floor(matrixCanvas.width / fontSize);
        const matrixDrops = [];
        const matrixEmojiChars = [];
        const matrixSpeeds = [];
        const matrixDelays = [];

        function initMatrix() {
            columns = Math.floor(matrixCanvas.width / fontSize);
            matrixDrops.length = 0;
            matrixEmojiChars.length = 0;
            matrixSpeeds.length = 0;
            matrixDelays.length = 0;
            
            for (let i = 0; i < columns; i++) {
                matrixDrops[i] = Math.random() * -100;
                matrixEmojiChars[i] = matrixEmojis[Math.floor(Math.random() * matrixEmojis.length)];
                matrixSpeeds[i] = 0.5 + Math.random() * 1.5;
                matrixDelays[i] = Math.random() * 100;
            }
        }

        initMatrix();

        function drawMatrix() {
            if (!isMatrixRunning) return;

            matrixCtx.fillStyle = 'rgba(10, 10, 10, 0.05)';
            matrixCtx.fillRect(0, 0, matrixCanvas.width, matrixCanvas.height);

            matrixCtx.font = fontSize + 'px serif';
            matrixCtx.textAlign = 'center';

            for (let i = 0; i < columns; i++) {
                if (matrixDelays[i] > 0) {
                    matrixDelays[i]--;
                    continue;
                }

                const x = i * fontSize + fontSize / 2;
                const y = matrixDrops[i] * fontSize;

                const gradient = matrixCtx.createLinearGradient(x, y - fontSize, x, y);
                gradient.addColorStop(0, 'rgba(255, 105, 180, 0.1)');
                gradient.addColorStop(0.5, 'rgba(255, 20, 147, 0.6)');
                gradient.addColorStop(1, 'rgba(255, 105, 180, 1)');
                
                matrixCtx.fillStyle = gradient;
                matrixCtx.fillText(matrixEmojiChars[i], x, y);

                matrixDrops[i] += matrixSpeeds[i] * 0.3;

                if (y > matrixCanvas.height && Math.random() > 0.975) {
                    matrixDrops[i] = -1;
                    matrixEmojiChars[i] = matrixEmojis[Math.floor(Math.random() * matrixEmojis.length)];
                    matrixSpeeds[i] = 0.5 + Math.random() * 1.5;
                }
            }

            matrixAnimationId = requestAnimationFrame(drawMatrix);
        }

        drawMatrix();

        // ============================================
        // PHASE 3: FLOATING EMOJIS (Apparaît à la fin avec le collage)
        // ============================================
        const floatingCanvas = document.getElementById('floatingCanvas');
        const floatingCtx = floatingCanvas.getContext('2d');

        let floatingAnimationId;
        let isFloatingRunning = false;

        function resizeFloatingCanvas() {
            floatingCanvas.width = window.innerWidth;
            floatingCanvas.height = window.innerHeight;
        }

        resizeFloatingCanvas();

        const floatingEmojis = ['⭐', '🌟', '✨', '🌸', '🌺', '🌻', '🌷', '🌹', '💐', '🦋', '🎀', '💖', '💝', '🎈', '🎉', '🎊', '🌈', '☀️', '🌙', '💫', '🍀', '🌿', '🕊️', '💕', '🎵', '💗', '💓', '💞', '💘', '❤️'];
        
        const floatingEmojiSize = 24;
        let floatingColumns = Math.floor(floatingCanvas.width / floatingEmojiSize);
        const floatingDrops = [];

        function initFloatingEmojis() {
            floatingColumns = Math.floor(floatingCanvas.width / floatingEmojiSize);
            floatingDrops.length = 0;
            
            for (let i = 0; i < floatingColumns; i++) {
                floatingDrops[i] = {
                    y: Math.random() * -floatingCanvas.height,
                    emoji: floatingEmojis[Math.floor(Math.random() * floatingEmojis.length)],
                    speed: 1 + Math.random() * 2,
                    opacity: 0.6 + Math.random() * 0.4,
                    wobble: Math.random() * Math.PI * 2,
                    wobbleSpeed: 0.02 + Math.random() * 0.03
                };
            }
        }

        function drawFloatingEmojis() {
            if (!isFloatingRunning) return;

            floatingCtx.clearRect(0, 0, floatingCanvas.width, floatingCanvas.height);
            
            floatingCtx.font = floatingEmojiSize + 'px serif';
            floatingCtx.textAlign = 'center';

            for (let i = 0; i < floatingColumns; i++) {
                const drop = floatingDrops[i];
                
                // Effet de flottement avec oscillation horizontale
                const wobbleX = Math.sin(drop.wobble) * 20;
                const x = i * floatingEmojiSize + floatingEmojiSize/2 + wobbleX;
                
                floatingCtx.globalAlpha = drop.opacity;
                floatingCtx.fillText(drop.emoji, x, drop.y);
                
                // Faire tomber l'emoji avec oscillation
                drop.y += drop.speed;
                drop.wobble += drop.wobbleSpeed;
                
                // Si l'emoji sort de l'écran, le remettre en haut
                if (drop.y > floatingCanvas.height + floatingEmojiSize) {
                    drop.y = -floatingEmojiSize;
                    drop.emoji = floatingEmojis[Math.floor(Math.random() * floatingEmojis.length)];
                    drop.speed = 1 + Math.random() * 2;
                    drop.opacity = 0.6 + Math.random() * 0.4;
                    drop.wobble = Math.random() * Math.PI * 2;
                }
            }
            
            floatingCtx.globalAlpha = 1;
            floatingAnimationId = requestAnimationFrame(drawFloatingEmojis);
        }

        // ============================================
        // ANIMATION AUTOMATIQUE - DÉCOMPTE DE 5
        // ============================================
        const countdownText = document.getElementById('countdownText');
        const heart = document.getElementById('heart');
        const gallerySection = document.getElementById('gallerySection');

        const messages = ['5', '4', '3', '2', '1', 'JOYEUX', 'ANNIVERSAIRE', 'MARIAM'];

        function startAnimation() {
            document.querySelector('.start-btn').classList.add('hidden');
            runAutoSequence();
        }

        function runAutoSequence() {
            let step = 0;
            
            const interval = setInterval(() => {
                if (step < messages.length) {
                    countdownText.classList.remove('show');
                    
                    setTimeout(() => {
                        countdownText.textContent = messages[step];
                        countdownText.classList.add('show');
                    }, 100);
                    
                    step++;
                } else {
                    clearInterval(interval);
                    countdownText.classList.remove('show');
                    
                    setTimeout(() => {
                        heart.classList.add('show');
                        
                        setTimeout(() => {
                            heart.classList.remove('show');
                            showGallery();
                        }, 2500);
                        
                    }, 300);
                }
            }, 1000);
        }

        // ============================================
        // GALERIE PHOTOS - NAVIGATION MANUELLE
        // ============================================
        let currentPhotoIndex = 0;
        let touchStartX = 0;
        let touchEndX = 0;

        function showGallery() {
            gallerySection.classList.add('active');
            loadPhoto(0);
        }

        function loadPhoto(index) {
            const img = document.getElementById('currentPhoto');
            img.style.opacity = '0';
            
            setTimeout(() => {
                img.src = photos[index];
                img.style.opacity = '1';
                document.getElementById('photoCounter').textContent = `${index + 1} / ${photos.length}`;
                
                if (photoMessages[index]) {
                    document.getElementById('galleryMessage').textContent = photoMessages[index];
                }
            }, 200);
        }

        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            loadPhoto(currentPhotoIndex);
        }

        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            loadPhoto(currentPhotoIndex);
        }

        // Navigation clavier
        document.addEventListener('keydown', (e) => {
            if (gallerySection.classList.contains('active') && !document.getElementById('heartCollage').classList.contains('active')) {
                if (e.key === 'ArrowRight') nextPhoto();
                if (e.key === 'ArrowLeft') prevPhoto();
            }
        });

        // Navigation tactile (swipe)
        gallerySection.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        gallerySection.addEventListener('touchend', (e) => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            const swipeThreshold = 50;
            const diff = touchStartX - touchEndX;
            
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    nextPhoto();
                } else {
                    prevPhoto();
                }
            }
        }

        // ============================================
        // PHASE 3: CŒUR FINAL AVEC PHOTOS + EMOJIS FLOTTANTS
        // ============================================
        function showHeartCollage() {
            // Arrêter le Matrix
            isMatrixRunning = false;
            cancelAnimationFrame(matrixAnimationId);
            matrixCanvas.style.opacity = '0';
            matrixCanvas.style.transition = 'opacity 1s ease';
            
            // Cacher la galerie
            gallerySection.classList.remove('active');
            
            // Afficher le collage
            document.getElementById('heartCollage').classList.add('active');
            createHeartCollage();
            
            // Démarrer les emojis flottants (apparaissent à la fin)
            setTimeout(() => {
                floatingCanvas.classList.add('active');
                isFloatingRunning = true;
                initFloatingEmojis();
                drawFloatingEmojis();
            }, 500);
        }

        function createHeartCollage() {
            const container = document.getElementById('collageContainer');
            container.innerHTML = '';
            
            const isMobile = window.innerWidth < 768;
            const scale = isMobile ? 0.7 : 1;
            
            const heartPositions = [
                {x: 200, y: 50}, {x: 300, y: 80}, {x: 100, y: 80},
                {x: 150, y: 150}, {x: 250, y: 150}, {x: 350, y: 150},
                {x: 100, y: 220}, {x: 200, y: 220}, {x: 300, y: 220}, {x: 400, y: 220},
                {x: 150, y: 290}, {x: 350, y: 290},
                {x: 200, y: 360}, {x: 300, y: 360},
                {x: 250, y: 430}
            ];

            heartPositions.forEach((pos, index) => {
                const photoIndex = index % photos.length;
                
                const photo = document.createElement('div');
                photo.className = 'collage-photo';
                photo.style.left = (pos.x * scale) + 'px';
                photo.style.top = (pos.y * scale) + 'px';
                photo.style.animationDelay = (index * 0.15) + 's';
                photo.innerHTML = `<img src="${photos[photoIndex]}" alt="photo">`;
                
                container.appendChild(photo);
            });

            // Cœur central animé
            const centerHeart = document.createElement('div');
            centerHeart.style.cssText = `
                position: absolute;
                left: ${210 * scale}px;
                top: ${210 * scale}px;
                font-size: ${isMobile ? '60px' : '80px'};
                color: #ff69b4;
                text-shadow: 0 0 30px #ff1493;
                animation: heartbeat 1s infinite;
                z-index: 10;
            `;
            centerHeart.innerHTML = '❤️';
            container.appendChild(centerHeart);
        }

        // Redimensionnement responsive
        window.addEventListener('resize', () => {
            resizeMatrixCanvas();
            resizeFloatingCanvas();
